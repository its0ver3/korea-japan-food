<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1f1d1a" />
<title>Trip Food · Vetted (Korea + Japan 2026)</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E✅%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css?v=2" />
<link rel="stylesheet" href="style-vetted.css?v=2" />
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <h1 class="brand">Trip Food</h1>
    <nav class="city-tabs" role="tablist" aria-label="City">
      <button class="city-tab" data-city="seoul" role="tab" aria-selected="true">Seoul</button>
      <button class="city-tab" data-city="busan" role="tab" aria-selected="false">Busan</button>
      <button class="city-tab" data-city="jeju" role="tab" aria-selected="false">Jeju</button>
      <button class="city-tab" data-city="osaka" role="tab" aria-selected="false">Osaka</button>
      <button class="city-tab" data-city="kyoto" role="tab" aria-selected="false">Kyoto</button>
      <button class="city-tab" data-city="tokyo" role="tab" aria-selected="false">Tokyo</button>
    </nav>
  </div>
</header>

<section class="filters">
  <div class="search-row">
    <input id="search" type="search" inputmode="search" autocomplete="off"
      placeholder="Search name, dish, neighborhood…" />
    <button id="near-me" class="btn-near" aria-pressed="false" title="Sort by distance">
      <span class="pin">📍</span><span class="near-label">Near me</span>
    </button>
  </div>
  <div class="chip-row" id="chip-row" aria-label="Filters">
    <!-- chips rendered by JS -->
  </div>
  <div class="view-row">
    <div class="view-toggle" role="tablist" aria-label="View">
      <button class="view-btn is-active" data-view="list" role="tab" aria-selected="true">List</button>
      <button class="view-btn" data-view="map" role="tab" aria-selected="false">Map</button>
    </div>
    <div class="count" id="count" aria-live="polite"></div>
  </div>
</section>

<main>
  <div id="list-view" class="view list-view" aria-hidden="false"></div>
  <div id="map-view" class="view map-view" aria-hidden="true"><div id="map"></div></div>
</main>

<div id="drawer" class="drawer" aria-hidden="true">
  <div class="drawer-scrim" data-close></div>
  <div class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
    <button class="drawer-close" data-close aria-label="Close">×</button>
    <div class="drawer-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js?v=2" type="module"></script>
</body>
</html>
